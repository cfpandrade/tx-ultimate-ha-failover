# TX Ultimate HA Failover - Bedroom Configuration Example
#
# This example is optimized for bedrooms:
# - Nightlight disabled (nightlight: "off")
# - Failover keeps current state (ha_failover_turn_on_lights: "false")
# - No auto-on when HA fails (lights stay off if they were off)

substitutions:
  ###### CHANGE ME START ######

  # ================================
  # DEVICE CONFIGURATION
  # ================================
  name: 'bedroom-tx'
  friendly_name: "Bedroom-TX"

  # ================================
  # HOME ASSISTANT SETTINGS
  # ================================
  ha_url: "https://home-assistant.local:8123"   # Your Home Assistant URL
  ha_api_token: "Bearer YOUR_LONG_LIVED_TOKEN_HERE"  # See instructions below
  ha_verify_ssl: "false"                  # Set to "true" when HA uses a valid trusted certificate
  ha_max_failures_before_failover: "10"   # Number of consecutive failed checks before failover mode

  # ================================
  # HARDWARE CONFIGURATION
  # ================================
  relay_count: "2"                   # Number of relays (1-3)
  vibra_time: 400ms                  # Vibration duration
  button_on_time: 500ms              # Button press duration

  # ================================
  # LED COLORS - RGB format (0-100)
  # ================================
  relay_state_top_enabled: "false"         # "true" = bottom button LEDs stay on while relay is ON (status indication)

  relay_state_button_color: "{0,0,100}"    # Bottom button color when relay is ON
  relay_state_button_brightness_active: "0.22"
  relay_state_button_brightness_idle: "0.10"
  relay_state_button_brightness_night: "0.04"

  led_idle_timeout: "15s"                  # After this time, persistent relay-state LEDs dim down
  led_feedback_restore_delay: "2s"         # How long touch feedback lasts (temporary visual confirmation)

  nightlight: "off"                  # "off" for bedrooms (no nightlight)
  nightlight_brightness: "0.2"
  nightlight_color: "{80,70,0}"      # Nightlight color (not used when nightlight: "off")

  touch_brightness: "1"
  touch_color: "{0,0,100}"           # Touch feedback - blue for toggle lights (full perimeter)
  touch_effect: "Scan"

  long_press_brightness: "1"
  long_press_color: "{100,0,0}"      # Long press color (red)
  long_press_effect: ""                   # Empty string = no animation effect

  multi_touch_brightness: "1"
  multi_touch_color: "{100,100,100}" # Multi-touch color (white)
  multi_touch_effect: ""             # Empty string = no animation effect

  swipe_left_brightness: "1"
  swipe_left_color: "{0,100,0}"      # Swipe left - green for opening blinds (full perimeter)
  swipe_left_effect: ""                   # Empty string = no animation effect

  swipe_right_brightness: "1"
  swipe_right_color: "{100,0,0}"     # Swipe right - red for closing blinds (full perimeter)
  swipe_right_effect: ""                  # Empty string = no animation effect

  # ================================
  # FAILOVER CONFIGURATION
  # ================================
  ha_failover_turn_on_lights: "false" # false for bedrooms (keep current state when HA fails)
  ha_failover_nightlight_color: "{100,0,0}"  # Red alert color when HA offline (not visible without nightlight)
  ha_heartbeat_interval: "60s"        # How often to check HA connection (default: 60s)

  # Relay behavior during NORMAL operation (when HA is online)
  # false = buttons send events to HA (HA controls lights via automations)
  # true = buttons work as physical switches (toggle relay directly)
  # NOTE: When HA fails, ALL relays automatically become physical switches
  toggle_relay_1_on_touch: "false"    # Relay 1 behavior
  toggle_relay_2_on_touch: "false"    # Relay 2 behavior
  toggle_relay_3_on_touch: "false"    # Relay 3 behavior

  # ================================
  # LOCATION FOR NIGHTLIGHT
  # ================================
  latitude: !secret latitude
  longitude: !secret longitude

  ###### CHANGE ME END ######

##### DO NOT CHANGE ANYTHING BELOW! #####

# ================================
# LOAD BASE CONFIGURATION FROM GITHUB
# ================================
packages:
  remote_package:
    url: https://github.com/cfpandrade/tx-ultimate-ha-failover
    ref: v1.3.5  # Recommended: pin to a release tag for stable builds
    files: [tx_ultimate_base.yaml]
    refresh: 300s  # Check for updates every 5 minutes

##### My customization - Start #####

# API with encryption
api:
  encryption:
    key: !secret api_key

# OTA updates
ota:
  - platform: esphome
    password: !secret ota_pass

# WiFi configuration
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  use_address: 192.168.1.51  # Optional: Set your fixed IP here

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Tx-Bedroom"
    password: !secret ap_pass

##### My customization - End #####
