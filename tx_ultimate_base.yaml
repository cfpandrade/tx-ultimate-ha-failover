# TX Ultimate HA Failover - Base Configuration
# Version: 1.3.5
# This file contains all the core functionality
# Include this via packages in your device config

substitutions:
  package_version: "1.3.5"
  ha_verify_ssl: "false"
  ha_max_failures_before_failover: "10"
  touch_cooldown_1_default: "0"
  touch_cooldown_2_default: "0"
  touch_cooldown_3_default: "0"
  relay_state_top_enabled: "true"
  relay_state_top_color: "{0,0,100}"
  relay_state_top_brightness_active: "0.30"
  relay_state_top_brightness_idle: "0.12"
  relay_state_top_brightness_night: "0.05"
  relay_state_button_color: "{0,0,100}"
  relay_state_button_brightness_active: "0.22"
  relay_state_button_brightness_idle: "0.10"
  relay_state_button_brightness_night: "0.04"
  led_idle_timeout: "15s"
  led_feedback_restore_delay: "800ms"
  swipe_left_duration: "3s"
  swipe_right_duration: "3s"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: smarthomeyourself.tx_ultimate
    version: ${package_version}

  platformio_options:
    build_flags:
      - -Wno-deprecated-declarations  # Suppress __attribute__((deprecated)) warnings
      - -Wno-cpp                       # Suppress #warning preprocessor warnings (legacy I2S/ADC driver notices)

  on_boot:
    priority: -100
    then:
      - binary_sensor.template.publish:
          id: touchfield_1
          state: OFF
      - binary_sensor.template.publish:
          id: touchfield_2
          state: OFF
      - binary_sensor.template.publish:
          id: touchfield_3
          state: OFF
      - binary_sensor.template.publish:
          id: multi_touch
          state: OFF
      - binary_sensor.template.publish:
          id: swipe_left
          state: OFF
      - binary_sensor.template.publish:
          id: swipe_right
          state: OFF
      - binary_sensor.template.publish:
          id: long_press
          state: OFF
      - binary_sensor.template.publish:
          id: ha_online
          state: OFF
      - script.execute: refresh_led_default
      - script.execute: refresh_nightlight
      # Inicializar heartbeat HA
      - lambda: |-
          id(ha_last_seen) = millis();

          const std::string device_name = "${name}";
          const std::string ha_url = "${ha_url}";
          const std::string ha_token = "${ha_api_token}";
          const int relay_count = ${relay_count};

          if (device_name.find('_') != std::string::npos) {
            ESP_LOGW("config", "El nombre '%s' contiene '_' y puede causar problemas con mDNS/DHCP. Recomendado usar '-'.", device_name.c_str());
          }

          if (relay_count < 1 || relay_count > 3) {
            ESP_LOGE("config", "relay_count=%d es invalido. Debe ser 1, 2 o 3.", relay_count);
          }

          if (!(ha_url.rfind("http://", 0) == 0 || ha_url.rfind("https://", 0) == 0)) {
            ESP_LOGW("config", "ha_url debe empezar por http:// o https://. Valor actual: %s", ha_url.c_str());
          }

          if (ha_token.rfind("Bearer ", 0) != 0) {
            ESP_LOGW("config", "ha_api_token deberia empezar por 'Bearer '.");
          }
      - delay: 5s
      - script.execute: check_ha_heartbeat

esp32:
  board: esp32dev
  framework:
    type: arduino
    platform_version: 6.5.0  # Pin to avoid sdkconfig.h build failure in ESPHome 2026.3.x

logger:
  level: INFO
  logs:
    binary_sensor: WARN
    light: WARN
    script: WARN
    switch: WARN
    tx_ultimate_touch: WARN
    component: ERROR

improv_serial:

captive_portal:

external_components:
  - source:
      type: git
      url: https://github.com/SmartHome-yourself/sonoff-tx-ultimate-for-esphome
      ref: main
    components: [tx_ultimate_touch]

# HTTP request para verificar HA
http_request:
  timeout: 5s
  verify_ssl: ${ha_verify_ssl}

globals:
  - id: nightlight_color
    type: int [3]
    restore_value: no
    initial_value: ${nightlight_color}
  - id: button_color
    type: int [3]
    restore_value: no
    initial_value: ${button_color}
  - id: long_press_color
    type: int [3]
    restore_value: no
    initial_value: ${long_press_color}
  - id: multi_touch_color
    type: int [3]
    restore_value: no
    initial_value: ${multi_touch_color}
  - id: swipe_left_color
    type: int [3]
    restore_value: no
    initial_value: ${swipe_left_color}
  - id: swipe_right_color
    type: int [3]
    restore_value: no
    initial_value: ${swipe_right_color}
  - id: touch_color
    type: int [3]
    restore_value: no
    initial_value: ${touch_color}
  - id: ha_failover_nightlight_color
    type: int [3]
    restore_value: no
    initial_value: ${ha_failover_nightlight_color}
  - id: relay_state_top_color
    type: int [3]
    restore_value: no
    initial_value: ${relay_state_top_color}
  - id: relay_state_button_color
    type: int [3]
    restore_value: no
    initial_value: ${relay_state_button_color}
  - id: relay_state_top_enabled_runtime
    type: bool
    restore_value: yes
    initial_value: ${relay_state_top_enabled}
  - id: neopixel_manual_mode
    type: bool
    restore_value: no
    initial_value: 'false'

  # Variables para heartbeat HA y estado de relays
  - id: ha_last_seen
    type: unsigned long
    restore_value: no
    initial_value: '0'
  - id: ha_offline_mode
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: ha_failed_checks
    type: int
    restore_value: no
    initial_value: '0'
  - id: ha_max_failures_before_failover
    type: int
    restore_value: no
    initial_value: ${ha_max_failures_before_failover}
  - id: relay_1_saved_state
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: relay_2_saved_state
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: relay_3_saved_state
    type: bool
    restore_value: no
    initial_value: 'false'

  # Control dinámico de toggle manual (comportamiento actual)
  - id: toggle_relay_1_on_touch
    type: bool
    restore_value: no
    initial_value: ${toggle_relay_1_on_touch}
  - id: toggle_relay_2_on_touch
    type: bool
    restore_value: no
    initial_value: ${toggle_relay_2_on_touch}
  - id: toggle_relay_3_on_touch
    type: bool
    restore_value: no
    initial_value: ${toggle_relay_3_on_touch}

  # Valores guardados del comportamiento normal (para restaurar cuando HA vuelve)
  - id: toggle_relay_1_saved
    type: bool
    restore_value: no
    initial_value: ${toggle_relay_1_on_touch}
  - id: toggle_relay_2_saved
    type: bool
    restore_value: no
    initial_value: ${toggle_relay_2_on_touch}
  - id: toggle_relay_3_saved
    type: bool
    restore_value: no
    initial_value: ${toggle_relay_3_on_touch}

  # Configuración failover
  - id: ha_failover_turn_on_lights
    type: bool
    restore_value: no
    initial_value: ${ha_failover_turn_on_lights}
  - id: led_idle_mode
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: led_feedback_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: touchfield_1_last_press_ms
    type: unsigned long
    restore_value: no
    initial_value: '0'
  - id: touchfield_2_last_press_ms
    type: unsigned long
    restore_value: no
    initial_value: '0'
  - id: touchfield_3_last_press_ms
    type: unsigned long
    restore_value: no
    initial_value: '0'

binary_sensor:
  # Estado de conexión HA
  - platform: template
    name: "${friendly_name} HA Online"
    id: ha_online
    device_class: connectivity

  - platform: template
    name: "Touchfield 1"
    id: touchfield_1
    on_press:
      - if:
          condition:
            lambda: |-
              return id(toggle_relay_1_on_touch);
          then:
            - switch.toggle: relay_1
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: touchfield_1
          state: OFF
      - script.execute: refresh_led_default

  - platform: template
    name: "Touchfield 2"
    id: touchfield_2
    on_press:
      - if:
          condition:
            lambda: |-
              return id(toggle_relay_2_on_touch);
          then:
            - switch.toggle: relay_2
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: touchfield_2
          state: OFF
      - script.execute: refresh_led_default

  - platform: template
    name: "Touchfield 3"
    id: touchfield_3
    on_press:
      - if:
          condition:
            lambda: |-
              return id(toggle_relay_3_on_touch);
          then:
            - switch.toggle: relay_3
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: touchfield_3
          state: OFF
      - script.execute: refresh_led_default

  - platform: template
    name: "Swipe left"
    id: swipe_left
    on_press:
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: swipe_left
          state: OFF
      - script.execute: refresh_led_default

  - platform: template
    name: "Swipe_right"
    id: swipe_right
    on_press:
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: swipe_right
          state: OFF
      - script.execute: refresh_led_default

  - platform: template
    name: "Multi Touch"
    id: multi_touch
    on_press:
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: multi_touch
          state: OFF
      - script.execute: refresh_led_default

  - platform: template
    name: "Long Press"
    id: long_press
    on_press:
      - delay: ${button_on_time}
      - binary_sensor.template.publish:
          id: long_press
          state: OFF
      - script.execute: refresh_led_default

switch:
  - platform: gpio
    id: relay_1
    name: "${friendly_name} L1"
    pin: GPIO18  # TX Ultimate hardware pin
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: register_led_activity
    on_turn_off:
      then:
        - script.execute: register_led_activity

  - platform: gpio
    id: relay_2
    name: "${friendly_name} L2"
    pin: GPIO17  # TX Ultimate hardware pin
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: register_led_activity
    on_turn_off:
      then:
        - script.execute: register_led_activity

  - platform: gpio
    id: relay_3
    name: "${friendly_name} L3"
    pin: GPIO27  # TX Ultimate hardware pin
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: register_led_activity
    on_turn_off:
      then:
        - script.execute: register_led_activity

  - platform: gpio
    id: vibra
    pin: GPIO21  # TX Ultimate hardware pin
    name: "${friendly_name} Vibration"
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: ${vibra_time}
      - switch.turn_off: vibra

  - platform: gpio
    id: pa_power
    pin: GPIO26  # TX Ultimate hardware pin
    name: "PA Power"
    internal: true
    restore_mode: ALWAYS_ON

  - platform: gpio
    name: "touch panel power"
    pin:
      number: GPIO5  # TX Ultimate hardware pin
      inverted: true
    id: touch_power
    internal: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    name: "Nightlight Auto"
    id: nightlight
    internal: true
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: refresh_led_default
    on_turn_off:
      then:
        - script.execute: refresh_led_default

  - platform: template
    name: "${friendly_name} Nightlight"
    id: nightlight_active
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - script.execute: refresh_led_default
    on_turn_off:
      then:
        - script.execute: refresh_led_default

  - platform: template
    name: "${friendly_name} Top Status LEDs"
    id: top_leds_enabled
    lambda: |-
      return id(relay_state_top_enabled_runtime);
    turn_on_action:
      - lambda: |-
          id(relay_state_top_enabled_runtime) = true;
      - script.execute: refresh_led_default
    turn_off_action:
      - lambda: |-
          id(relay_state_top_enabled_runtime) = false;
      - script.execute: refresh_led_default
  - platform: restart
    name: "${friendly_name} Restart"

number:
  - platform: template
    name: "${friendly_name} Touch Cooldown 1"
    id: touch_cooldown_1
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 10
    step: 0.5
    initial_value: ${touch_cooldown_1_default}

  - platform: template
    name: "${friendly_name} Touch Cooldown 2"
    id: touch_cooldown_2
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 10
    step: 0.5
    initial_value: ${touch_cooldown_2_default}

  - platform: template
    name: "${friendly_name} Touch Cooldown 3"
    id: touch_cooldown_3
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 10
    step: 0.5
    initial_value: ${touch_cooldown_3_default}

light:
  - platform: neopixelbus
    type: GRB
    variant: WS2811
    pin: GPIO13  # TX Ultimate hardware pin
    num_leds: 28
    name: "NeoPixel Light"
    id: leds
    default_transition_length: 0s
    effects:
      - pulse:
          name: "Pulse"
          transition_length: 1.4s
          update_interval: 1s
    on_turn_off:
      then:
        - script.execute: clear_all_leds
        - script.execute: refresh_led_default

  - platform: partition
    name: "LEDs Button right"
    id: leds_button_right
    internal: true
    segments:
      - id: leds
        from: 6
        to: 9
  - platform: partition
    name: "LEDs Button middle"
    id: leds_button_middle
    internal: true
    segments:
      - id: leds
        from: 8
        to: 10
  - platform: partition
    name: "LEDs Button left"
    id: leds_button_left
    internal: true
    segments:
      - id: leds
        from: 9
        to: 12

  - platform: partition
    name: "LEDs Nightlight"
    id: leds_nightlight
    internal: true
    segments:
      - id: leds
        from: 0
        to: 5
      - id: leds
        from: 8
        to: 8
      - id: leds
        from: 10
        to: 10
      - id: leds
        from: 13
        to: 19
      - id: leds
        from: 27
        to: 27

  - platform: partition
    name: "LEDs Top"
    id: leds_top
    internal: true
    segments:
      - id: leds
        from: 20
        to: 26
    effects:
      - addressable_scan:
          name: "Scan"

  - platform: partition
    name: "LEDs Top Right"
    id: leds_top_right
    internal: true
    segments:
      - id: leds
        from: 20
        to: 22

  - platform: partition
    name: "LEDs Top Middle"
    id: leds_top_middle
    internal: true
    segments:
      - id: leds
        from: 23
        to: 23

  - platform: partition
    name: "LEDs Top Left"
    id: leds_top_left
    internal: true
    segments:
      - id: leds
        from: 24
        to: 26

i2s_audio:
  id: audio_i2s
  i2s_lrclk_pin: GPIO4   # TX Ultimate hardware pin
  i2s_bclk_pin: GPIO2    # TX Ultimate hardware pin

speaker:
  - platform: i2s_audio
    id: media_speaker
    dac_type: external
    i2s_dout_pin: GPIO15  # TX Ultimate hardware pin
    i2s_audio_id: audio_i2s
    i2s_comm_fmt: lsb
    mode: mono

media_player:
  - platform: speaker
    id: media_out
    name: ${friendly_name} Player
    speaker: media_speaker

uart:
  tx_pin: GPIO19  # TX Ultimate hardware pin
  rx_pin: GPIO22  # TX Ultimate hardware pin
  id: my_uart
  baud_rate: 115200
  data_bits: 8
  stop_bits: 1
  parity: NONE

tx_ultimate_touch:
  id: tx_touch
  uart: my_uart

  on_press:
    - script.execute: register_led_activity
    - script.execute: led_on_touch
    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_press", "Touch Position: %d / State: %d", touch.x, touch.state);

  on_release:
    - script.execute:
        id: handle_release
        pos: !lambda "return touch.x;"

    - switch.turn_on: vibra

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_release", "Release Position: %d / State: %d", touch.x, touch.state);

  on_swipe_left:
    - script.execute: register_led_activity
    - script.execute: led_on_swipe_left

    - switch.turn_on: vibra

    - binary_sensor.template.publish:
        id: swipe_left
        state: ON

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_swipe_left", "Swipe Left Position: %d / State: %d", touch.x, touch.state);

  on_swipe_right:
    - script.execute: register_led_activity
    - script.execute: led_on_swipe_right

    - switch.turn_on: vibra

    - binary_sensor.template.publish:
        id: swipe_right
        state: ON

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_swipe_right", "Swipe Right Position: %d / State: %d", touch.x, touch.state);

  on_full_touch_release:
    - script.execute: register_led_activity
    - script.execute: led_on_full_touch

    - switch.turn_on: vibra

    - binary_sensor.template.publish:
        id: multi_touch
        state: ON

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_full_touch_release", "Full Touch Release Position: %d / State: %d", touch.x, touch.state);

  on_long_touch_release:
    - script.execute: register_led_activity
    - script.execute: led_on_long_touch

    - switch.turn_on: vibra

    - binary_sensor.template.publish:
        id: long_press
        state: ON

    - lambda: >
        ESP_LOGD("tx_ultimate_touch.on_long_touch_release", "Long Touch Release Position: %d / State: %d", touch.x, touch.state);

time:
  - platform: homeassistant
  - platform: sntp
    on_time:
      # Every 5 minutes
      - seconds: 0
        minutes: /5
        then:
          - script.execute: refresh_nightlight

sun:
  latitude: ${latitude}
  longitude: ${longitude}

script:
  - id: refresh_nightlight
    mode: restart
    then:
      - if:
          condition:
            lambda: 'return "${nightlight}" == "on";'
          then:
            - if:
                condition:
                  - sun.is_below_horizon:
                then:
                  - switch.turn_on:
                      id: nightlight
                else:
                  - switch.turn_off:
                      id: nightlight

  - id: clear_all_leds
    mode: restart
    then:
      - light.addressable_set:
          id: leds
          range_from: 0
          range_to: 27
          red: 0%
          green: 0%
          blue: 0%
      - light.turn_off: leds_nightlight
      - light.turn_off: leds_button_left
      - light.turn_off: leds_button_middle
      - light.turn_off: leds_button_right
      - light.turn_off: leds_top_left
      - light.turn_off: leds_top_middle
      - light.turn_off: leds_top_right
      - light.turn_off: leds_top

  - id: refresh_led_default
    mode: restart
    then:
      - if:
          condition:
            lambda: |-
              return !id(led_feedback_active);
          then:
            - if:
                condition:
                  lambda: |-
                    return (${relay_count}>1 && id(relay_1).state);
                then:
                  - script.execute: led_on_button_left
                else:
                  - script.execute: led_off_button_left

            - if:
                condition:
                  lambda: |-
                    return (${relay_count}==3 && id(relay_2).state) || (${relay_count}==1 && id(relay_1).state);
                then:
                  - script.execute: led_on_button_middle
                else:
                  - script.execute: led_off_button_middle

            - if:
                condition:
                  lambda: |-
                    return (${relay_count}==2 && id(relay_2).state) || (${relay_count}==3 && id(relay_3).state);
                then:
                  - script.execute: led_on_button_right
                else:
                  - script.execute: led_off_button_right

            - if:
                condition:
                  lambda: |-
                    return id(nightlight).state;
                then:
                  - script.execute: led_on_nightlight
                else:
                  - light.turn_off: leds_nightlight

            - lambda: |-
                const bool show_nightlight = id(nightlight).state;
                const bool top_enabled = id(relay_state_top_enabled_runtime);
                const float active_brightness = ${relay_state_top_brightness_active};
                const float idle_brightness = ${relay_state_top_brightness_idle};
                const float night_brightness = ${relay_state_top_brightness_night};
                const float selected_brightness = show_nightlight
                  ? night_brightness
                  : (id(led_idle_mode) ? idle_brightness : active_brightness);

                const float state_red = id(relay_state_top_color)[0] / 100.0f;
                const float state_green = id(relay_state_top_color)[1] / 100.0f;
                const float state_blue = id(relay_state_top_color)[2] / 100.0f;
                const float night_red = id(nightlight_color)[0] / 100.0f;
                const float night_green = id(nightlight_color)[1] / 100.0f;
                const float night_blue = id(nightlight_color)[2] / 100.0f;

                const bool left_on = (${relay_count} > 1) && id(relay_1).state;
                const bool middle_on = (${relay_count} == 3 && id(relay_2).state) || (${relay_count} == 1 && id(relay_1).state);
                const bool right_on = (${relay_count} == 2 && id(relay_2).state) || (${relay_count} == 3 && id(relay_3).state);
                const bool any_top_on = ${relay_count} == 1
                  ? id(relay_1).state
                  : (left_on || middle_on || right_on);

                // Ensure a previous full-bar effect is cleared before restoring per-zone LEDs.
                id(leds_top).turn_off().perform();

                auto apply_zone = [&](auto *zone, bool zone_on) {
                  if (top_enabled && zone_on) {
                    auto call = zone->turn_on();
                    call.set_brightness(selected_brightness);
                    call.set_rgb(state_red, state_green, state_blue);
                    call.perform();
                    return;
                  }

                  if (show_nightlight) {
                    auto call = zone->turn_on();
                    call.set_brightness(${nightlight_brightness});
                    call.set_rgb(night_red, night_green, night_blue);
                    call.perform();
                    return;
                  }

                  zone->turn_off().perform();
                };

                if (${relay_count} == 1) {
                  apply_zone(id(leds_top_left), id(relay_1).state);
                  apply_zone(id(leds_top_middle), id(relay_1).state);
                  apply_zone(id(leds_top_right), id(relay_1).state);
                } else {
                  apply_zone(id(leds_top_left), left_on);
