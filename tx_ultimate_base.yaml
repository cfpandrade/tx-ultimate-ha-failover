                  id(touch_color)[1] / 100.0f,
                  id(touch_color)[2] / 100.0f
                );
                const std::string effect = "${touch_effect}";
                if (effect == "Scan") {
                  call.set_effect(effect);
                }
                call.perform();
            - delay: ${led_feedback_restore_delay}
