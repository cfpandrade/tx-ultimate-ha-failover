  - id: maybe_trigger_touchfield_1
    mode: restart
    then:
      - lambda: |-
          const uint32_t now = millis();
          const uint32_t cooldown_ms = static_cast<uint32_t>(id(touch_cooldown_1).state * 1000.0f);
          if (cooldown_ms > 0 && now - id(touchfield_1_last_press_ms) < cooldown_ms) {
            ESP_LOGI("cooldown", "Ignoring Touchfield 1 press during %.1fs cooldown", id(touch_cooldown_1).state);
            return;
          }
          id(touchfield_1_last_press_ms) = now;
          id(touchfield_1).publish_state(true);

  - id: maybe_trigger_touchfield_2
    mode: restart
    then:
      - lambda: |-
          const uint32_t now = millis();
          const uint32_t cooldown_ms = static_cast<uint32_t>(id(touch_cooldown_2).state * 1000.0f);
          if (cooldown_ms > 0 && now - id(touchfield_2_last_press_ms) < cooldown_ms) {
            ESP_LOGI("cooldown", "Ignoring Touchfield 2 press during %.1fs cooldown", id(touch_cooldown_2).state);
            return;
          }
          id(touchfield_2_last_press_ms) = now;
          id(touchfield_2).publish_state(true);

  - id: maybe_trigger_touchfield_3
    mode: restart
    then:
      - lambda: |-
          const uint32_t now = millis();
          const uint32_t cooldown_ms = static_cast<uint32_t>(id(touch_cooldown_3).state * 1000.0f);
          if (cooldown_ms > 0 && now - id(touchfield_3_last_press_ms) < cooldown_ms) {
            ESP_LOGI("cooldown", "Ignoring Touchfield 3 press during %.1fs cooldown", id(touch_cooldown_3).state);
            return;
          }
          id(touchfield_3_last_press_ms) = now;
          id(touchfield_3).publish_state(true);

  - id: handle_release
    mode: restart
    parameters:
      pos: int
    then:
      - if:
          condition:
            lambda: |-
              return ${relay_count}==1;
          then:
            - script.execute: maybe_trigger_touchfield_1

      - if:
          condition:
            lambda: |-
              return ${relay_count}==2;
          then:
            - if:
                condition:
                  lambda: |-
                    return pos <= 5;
                then:
                  - script.execute: maybe_trigger_touchfield_1

                else:
                  - script.execute: maybe_trigger_touchfield_2

      - if:
          condition:
            lambda: |-
              return ${relay_count}==3;
          then:
            - if:
                condition:
                  lambda: |-
                    return pos <= 3;
                then:
                  - script.execute: maybe_trigger_touchfield_1

                else:
                  - if:
                      condition:
                        lambda: |-
                          return pos <= 7;
                      then:
                        - script.execute: maybe_trigger_touchfield_2

                      else:
                        - script.execute: maybe_trigger_touchfield_3

  # Script para verificar heartbeat con HA usando HTTP API
  - id: check_ha_heartbeat
    mode: single
    then:
      - http_request.get:
          url: "${ha_url}/api/"
          request_headers:
            Authorization: !lambda 'return "${ha_api_token}";'
          on_response:
            then:
              - lambda: |-
                  ESP_LOGI("heartbeat", "HA API respondió correctamente");

                  // Actualizar timestamp y resetear contador de fallos
                  id(ha_last_seen) = millis();
                  id(ha_failed_checks) = 0;
                  id(ha_online).publish_state(true);

                  // Si estábamos en modo offline, restaurar estados
                  if (id(ha_offline_mode)) {
                    ESP_LOGI("heartbeat", "HA volvió online! Restaurando comportamiento automático");
                    id(ha_offline_mode) = false;

                    // RESTAURAR comportamiento normal de cada relay
                    ESP_LOGI("heartbeat", "Restaurando comportamiento normal de relays");
                    id(toggle_relay_1_on_touch) = id(toggle_relay_1_saved);
                    id(toggle_relay_2_on_touch) = id(toggle_relay_2_saved);
                    id(toggle_relay_3_on_touch) = id(toggle_relay_3_saved);

                    // Restaurar estados guardados de relays
                    if (id(relay_1).state != id(relay_1_saved_state)) {
                      ESP_LOGI("heartbeat", "Restaurando Relay 1 a: %s", id(relay_1_saved_state) ? "ON" : "OFF");
                      id(relay_1_saved_state) ? id(relay_1).turn_on() : id(relay_1).turn_off();
                    }
                    if (id(relay_2).state != id(relay_2_saved_state)) {
                      ESP_LOGI("heartbeat", "Restaurando Relay 2 a: %s", id(relay_2_saved_state) ? "ON" : "OFF");
                      id(relay_2_saved_state) ? id(relay_2).turn_on() : id(relay_2).turn_off();
                    }
                    if (id(relay_3).state != id(relay_3_saved_state)) {
                      ESP_LOGI("heartbeat", "Restaurando Relay 3 a: %s", id(relay_3_saved_state) ? "ON" : "OFF");
                      id(relay_3_saved_state) ? id(relay_3).turn_on() : id(relay_3).turn_off();
                    }
                    id(led_feedback_active) = false;
                    id(led_idle_mode) = false;
                    id(register_led_activity).execute();
                    id(refresh_led_default).execute();
                  }
          on_error:
            - lambda: |-
                id(ha_failed_checks)++;
                ESP_LOGW("heartbeat", "Error al conectar con HA API (fallo #%d/%d)", id(ha_failed_checks), id(ha_max_failures_before_failover));

                // Verificar si necesitamos entrar en modo failover
                if (id(ha_failed_checks) >= id(ha_max_failures_before_failover) && !id(ha_offline_mode)) {
                  ESP_LOGE("heartbeat", "HA offline por demasiados fallos consecutivos, activando MODO MANUAL");
                  id(ha_offline_mode) = true;

                  // Guardar estados actuales
                  id(relay_1_saved_state) = id(relay_1).state;
                  id(relay_2_saved_state) = id(relay_2).state;
                  id(relay_3_saved_state) = id(relay_3).state;

                  ESP_LOGI("heartbeat", "Estados guardados - R1:%s R2:%s R3:%s",
                          id(relay_1_saved_state) ? "ON" : "OFF",
                          id(relay_2_saved_state) ? "ON" : "OFF",
                          id(relay_3_saved_state) ? "ON" : "OFF");

                  // ACTIVAR MODO MANUAL (los switches funcionan como interruptores)
                  ESP_LOGW("heartbeat", "Activando modo MANUAL en los switches");
                  id(toggle_relay_1_on_touch) = true;
                  id(toggle_relay_2_on_touch) = true;
                  id(toggle_relay_3_on_touch) = true;

                  // Opcional: encender luces solo en living/comedor
                  if (id(ha_failover_turn_on_lights)) {
                    ESP_LOGW("heartbeat", "Encendiendo todas las luces por seguridad");
                    id(relay_1).turn_on();
                    id(relay_2).turn_on();
                    id(relay_3).turn_on();
                  }

                  id(ha_online).publish_state(false);
                }

            # Cambiar nightlight a color de alerta si HA está offline
            - if:
                condition:
                  lambda: |-
                    return id(ha_offline_mode);
                then:
                  - light.turn_on:
                      id: leds_nightlight
                      brightness: ${nightlight_brightness}
                      red: !lambda "return id(ha_failover_nightlight_color)[0]/100.0;"
                      green: !lambda "return id(ha_failover_nightlight_color)[1]/100.0;"
                      blue: !lambda "return id(ha_failover_nightlight_color)[2]/100.0;"

  - id: touch_led_marker
    mode: restart
    parameters:
      state: int
      pos: int
    then:
      - if:
          condition:
            lambda: |-
              return state==1;
          then:
            # RELEASE
            - light.turn_off: leds

          else:
            - if:
                condition:
                  lambda: |-
                    return state==2;
                then:
                  # TOUCH
                  - light.turn_on:
                      id: leds
                      red: 1
                      green: 0
                      blue: 0
                  - delay: 6s
                  - light.turn_off: leds

                else:
                  - if:
                      condition:
                        lambda: |-
                          return state==11;
                      then:
                        # FULL-TOUCH RELEASE
                        - light.turn_on:
                            id: leds
                            brightness: ${multi_touch_brightness}
                            red: !lambda "return id(multi_touch_color)[0] / 100.0f;"
                            green: !lambda "return id(multi_touch_color)[1] / 100.0f;"
                            blue: !lambda "return id(multi_touch_color)[2] / 100.0f;"
                        - delay: 1s
                        - light.turn_off: leds

                      else:
                        # SWIPE
                        - if:
                            condition:
                              lambda: |-
                                return state==13;
                            then:
                              # SWIPE LEFT
                              - light.turn_on:
                                  id: leds
                                  red: 0
                                  green: 1
                                  blue: 0

                        - if:
                            condition:
                              lambda: |-
                                return state==12;
                            then:
                              # SWIPE RIGHT
                              - light.turn_on:
                                  id: leds
                                  red: 0
                                  green: 0
                                  blue: 1
                        - delay: 1s
                        - light.turn_off: leds

interval:
  # Verificar conexión WiFi cada 10 minutos
  - interval: 10min
    then:
      - if:
          condition:
            lambda: |-
              return millis() > 180000 && !network::is_connected();
          then:
            - logger.log:
                level: WARN
                tag: "wifi"
                format: "WiFi desconectado por >3 minutos, reiniciando..."
            - lambda: "ESP.restart();"

  # Heartbeat con Home Assistant
  - interval: ${ha_heartbeat_interval}
    then:
      - script.execute: check_ha_heartbeat
